server:
  port: 8090

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # Route document metadata reads to processing-service.
            - id: processing-service-metadata
              uri: http://localhost:8091
              predicates:
                - Path=/api/documents/*/metadata
              filters:
                - StripPrefix=1

            # Route extracted text reads to processing-service.
            - id: processing-service-text
              uri: http://localhost:8091
              predicates:
                - Path=/api/documents/*/text
              filters:
                - StripPrefix=1

            # Route all document API requests to document-service.
            - id: document-service
              uri: http://localhost:8080
              predicates:
                - Path=/api/documents,/api/documents/**
              filters:
                - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health
